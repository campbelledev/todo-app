<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>To-Do List Complète</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Ma To-Do List</h1>
        <div class="theme-toggle">
            <button id="toggleTheme">Changer de thème</button>
        </div>
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Ajouter une tâche...">
            <button id="addBtn">Ajouter</button>
        </div>
        <ul id="taskList"></ul>
        <div class="footer">
            <span id="taskCount">0 tâches restantes</span>
            <button id="clearCompleted">Supprimer tâches terminées</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
